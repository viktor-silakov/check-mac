<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Used MacBook Checker</title>
<style>
  :root { --ok:#2ecc71; --bg:#f5f5f7; --card:#fff; --accent:#0071e3; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); margin:0; color:#1d1d1f; }
  header { position:sticky; top:0; background:var(--card); padding:12px 20px; box-shadow:0 1px 4px rgba(0,0,0,.1); z-index:10; }
  .headrow { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  header h1 { margin:0; font-size:20px; flex:1; }
  #langsel { font-size:14px; padding:5px 8px; border-radius:8px; border:1px solid #ccc; background:#fff; }
  #termbtn { font-size:13px; background:var(--accent); color:#fff; border:none; cursor:pointer; padding:6px 12px; border-radius:8px; white-space:nowrap; }
  #termbtn:hover { opacity:.85; }
  .cmdrow { display:flex; gap:8px; align-items:flex-start; margin:4px 0 12px; }
  pre.cmd { flex:1; background:#1d1d1f; color:#e8e8ed; padding:10px 12px; border-radius:8px; font-size:12.5px; margin:0; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
  #progressbar { height:8px; background:#e0e0e0; border-radius:4px; overflow:hidden; }
  #progressfill { height:100%; width:0; background:var(--ok); transition:width .3s; }
  #progresstext { font-size:13px; color:#666; margin-top:4px; }
  main { max-width:860px; margin:0 auto; padding:20px; }
  section { background:var(--card); border-radius:12px; padding:16px 20px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  section h2 { margin:0 0 10px; font-size:17px; }
  ul { list-style:none; margin:0; padding:0; }
  li { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid #f0f0f0; }
  li:last-child { border-bottom:none; }
  li input[type=checkbox] { width:20px; height:20px; margin-top:2px; flex-shrink:0; accent-color:var(--ok); }
  li.done label { color:#999; text-decoration:line-through; }
  li label { flex:1; cursor:pointer; line-height:1.45; }
  .hint { display:block; font-size:12.5px; color:#888; text-decoration:none !important; margin-top:2px; }
  li.done .hint { color:#bbb; }
  code { background:#eee; padding:1px 5px; border-radius:4px; font-size:13px; }
  button.test { flex-shrink:0; background:var(--accent); color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; }
  button.test:hover { opacity:.85; }
  #resetBtn { background:#d70015; color:#fff; border:none; border-radius:8px; padding:8px 16px; cursor:pointer; margin-top:8px; }
  /* serial */
  .snrow { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  #sninput { flex:1; min-width:200px; padding:9px 12px; border:1px solid #ccc; border-radius:8px; font-size:15px; text-transform:uppercase; }
  .snrow button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:9px 16px; cursor:pointer; font-size:14px; }
  /* modal */
  #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:center; justify-content:center; }
  #modal.open { display:flex; }
  #modalbox { background:#fff; border-radius:14px; padding:20px; max-width:820px; width:94%; max-height:92vh; overflow:auto; }
  #modalbox h3 { margin:0 0 12px; }
  #modalclose { float:right; background:#e8e8ed; border:none; border-radius:8px; padding:6px 12px; cursor:pointer; }
  /* pixel test */
  #pixeltest { display:none; position:fixed; inset:0; z-index:200; cursor:pointer; }
  #pixelhint { position:absolute; top:12px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.6); color:#fff; padding:8px 16px; border-radius:8px; font-size:14px; pointer-events:none; }
  /* keyboard */
  #kb { user-select:none; }
  .kbrow { display:flex; gap:4px; margin-bottom:4px; }
  .key { background:#e8e8ed; border-radius:5px; padding:8px 0; text-align:center; font-size:11px; flex:1; min-width:0; overflow:hidden; white-space:nowrap; }
  .key.wide { flex:1.6; } .key.xwide { flex:2.2; } .key.space { flex:6; }
  .key.pressed { background:#ffd60a; }
  .key.tested { background:var(--ok); color:#fff; }
  /* media */
  video { width:100%; max-height:360px; background:#000; border-radius:8px; transform:scaleX(-1); }
  #miclevel { height:24px; background:#e0e0e0; border-radius:6px; overflow:hidden; margin-top:10px; }
  #micfill { height:100%; width:0; background:var(--ok); transition:width .05s; }
  /* trackpad */
  #padcanvas { width:100%; height:260px; background:#f0f0f2; border-radius:8px; touch-action:none; cursor:crosshair; }
  .padstats span { display:inline-block; background:#e8e8ed; border-radius:6px; padding:4px 10px; margin:4px 6px 0 0; font-size:13px; }
  .padstats span.ok { background:var(--ok); color:#fff; }
  .btnrow { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; }
  .btnrow button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:10px 18px; cursor:pointer; }
  .btnrow button.secondary { background:#e8e8ed; color:#1d1d1f; }
  #batteryinfo { font-size:15px; line-height:1.6; }
  /* auto-check */
  #pastearea { width:100%; min-height:80px; font-family:ui-monospace,Menlo,monospace; font-size:12.5px; border:1px solid #ccc; border-radius:8px; padding:10px; resize:vertical; }
  .autonote { font-size:12px; border-radius:6px; padding:1px 7px; white-space:nowrap; }
  .autonote.pass { background:#e2f7e9; color:#1a7f37; }
  .autonote.warn { background:#fff3cd; color:#8a6d00; }
  .autonote.fail { background:#ffe0e0; color:#c00; }
  .autonote.note { background:#e8e8ed; color:#555; }
</style>
</head>
<body>

<header>
  <div class="headrow">

  <div id="progressbar"><div id="progressfill"></div></div>
  <div id="progresstext"></div>
</header>

<main id="main"></main>

<div id="modal"><div id="modalbox">
  <button id="modalclose"></button>
  <div id="modalcontent"></div>
</div></div>

<div id="pixeltest"><div id="pixelhint"></div></div>

  batTitle:'Ladetest der Anschlüsse', batHint:'Ladekabel der Reihe nach in jeden Anschluss stecken — der Status muss auf „⚡ lädt“ wechseln. Funktioniert in Chrome; in Safari das Akku-Symbol von macOS beobachten.', batNoApi:'Die Battery API ist in diesem Browser nicht verfügbar — in Chrome öffnen oder das Akku-Symbol in der macOS-Menüleiste beobachten.', batLoading:'Laden…', batCharging:'⚡ lädt', batOnBattery:'🔋 im Akkubetrieb', batStatus:'Status', batLevel:'Ladestand',
  padTitle:'Trackpad-Test', padHint:'Mit dem Finger über die gesamte Fläche fahren (die Spur wird gezeichnet), an verschiedenen Stellen klicken, Zwei-Finger-Klick (Rechtsklick) und Zwei-Finger-Scrollen ausprobieren.', padMove:'Bewegung', padLeft:'Linksklick', padRight:'Zwei-Finger-Klick', padScroll:'Zwei-Finger-Scroll', padClear:'Feld leeren',
 }
},
};

// ---------- state ----------
const LS_KEY = 'macbook-check', LS_LANG = 'macbook-check-lang', LS_SN = 'macbook-check-sn';
const state = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
const AUTO_KEY = 'macbook-check-auto';
const statuses = JSON.parse(localStorage.getItem(AUTO_KEY) || '{}');
// просим браузер не вычищать localStorage при нехватке места
navigator.storage?.persist?.();
let lang = localStorage.getItem(LS_LANG) || 'en';
if (!I18N[lang]) lang = 'en';
const L = () => I18N[lang];
const fmt = (s, vars) => s.replace(/\{(\w+)\}/g, (_, k) => vars[k]);

// ---------- render ----------
function render() {
  closeModal();
  const { sections, items, ui } = L();
  document.documentElement.lang = lang;
  document.title = ui.title.replace('🍎 ', '');
  document.getElementById('apptitle').textContent = ui.title;
  document.getElementById('modalclose').textContent = ui.close;
  document.getElementById('termbtn').textContent = ui.term;
  let html = `<section><h2>${ui.pasteTitle}</h2><p class="hint">${ui.pasteHint}</p><textarea id="pastearea" placeholder="activation=pass&#10;cycles=warn 670"></textarea><div class="btnrow"><button id="applyBtn">${ui.apply}</button></div><p class="hint" id="applyres"></p></section>`;
  for (const [secId, secItems] of SECTIONS) {
    html += `<section><h2>${sections[secId]}</h2>`;
    if (secId === 'serial') {
      html += `<div class="snrow"><input id="sninput" placeholder="${ui.snPh}"><button id="coverageBtn">${ui.coverage}</button></div>`;
    }
    html += '<ul>';
    for (const it of secItems) {
      const [id, test] = Array.isArray(it) ? it : [it, null];
      const [label, hint] = items[id];
      html += `<li data-id="${id}"><input type="checkbox"><label>${label}${badge(id)}` +
        (hint ? `<span class="hint">${hint}</span>` : '') +
        (id === 'wifi' ? `<span class="hint" id="wifistatus"></span>` : '') +
        `</label>` +
        (test ? `<button class="test" data-test="${test}">${ui.test}</button>` : '') +
        `</li>`;
    }
    html += '</ul></section>';
  }
  html += `<button id="resetBtn">${ui.reset}</button>`;
  document.getElementById('main').innerHTML = html;

  document.querySelectorAll('li[data-id]').forEach(li => {
    const cb = li.querySelector('input');
    cb.checked = !!state[li.dataset.id];
    li.classList.toggle('done', cb.checked);
    cb.addEventListener('change', () => {
      state[li.dataset.id] = cb.checked;
      li.classList.toggle('done', cb.checked);
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      updateProgress();
    });
  });
  document.querySelectorAll('button[data-test]').forEach(btn => {
    btn.onclick = () => tests[btn.dataset.test]();
  });
  document.getElementById('resetBtn').onclick = () => {
    if (confirm(L().ui.resetConfirm)) {
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(AUTO_KEY);
      location.reload();
    }
  };
  // serial
  const sn = document.getElementById('sninput');
  sn.value = localStorage.getItem(LS_SN) || '';
  sn.addEventListener('input', () => localStorage.setItem(LS_SN, sn.value.trim().toUpperCase()));
  document.getElementById('coverageBtn').onclick = () => {
    const v = sn.value.trim().toUpperCase();
    if (!v) { alert(L().ui.snEmpty); sn.focus(); return; }
    window.open('https://checkcoverage.apple.com/?sn=' + encodeURIComponent(v), '_blank');
  };
  document.getElementById('applyBtn').onclick = applyPaste;
  updateProgress();
  wifiUpd();
}

function updateProgress() {
  const items = document.querySelectorAll('li[data-id]');
  const done = [...items].filter(li => li.querySelector('input').checked).length;
  document.getElementById('progressfill').style.width = (done / items.length * 100) + '%';
  document.getElementById('progresstext').textContent = fmt(L().ui.progress, { d: done, t: items.length });
}

// ---------- language ----------
const langsel = document.getElementById('langsel');
langsel.value = lang;
langsel.onchange = () => {
  lang = langsel.value;
  localStorage.setItem(LS_LANG, lang);
  render();
};

// ---------- modal ----------
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalcontent');
let modalCleanup = null;
function openModal(html) { modalContent.innerHTML = html; modal.classList.add('open'); }
function closeModal() {
  modal.classList.remove('open');
  modalContent.innerHTML = '';
  if (modalCleanup) { modalCleanup(); modalCleanup = null; }
}
document.getElementById('modalclose').onclick = closeModal;
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

const tests = {};

// ---------- dead pixels ----------
const COLORS = ['#fff', '#000', '#f00', '#0f0', '#00f', '#808080'];
tests.pixels = () => {
  const el = document.getElementById('pixeltest');
  let i = 0;
  const show = () => {
    el.style.background = COLORS[i];
    document.getElementById('pixelhint').textContent =
      fmt(L().ui.pixelHint, { name: L().ui.pixelColors[i], i: i + 1, n: COLORS.length });
  };
  el.style.display = 'block';
  show();
  el.requestFullscreen && el.requestFullscreen().catch(() => {});
  el.onclick = () => { i = (i + 1) % COLORS.length; show(); };
  const exit = () => {
    if (!document.fullscreenElement) {
      el.style.display = 'none';
      document.removeEventListener('fullscreenchange', exit);
    }
  };
  document.addEventListener('fullscreenchange', exit);
};

// ---------- keyboard ----------
const KB_ROWS = [
  [['Escape','esc'],['F1','F1'],['F2','F2'],['F3','F3'],['F4','F4'],['F5','F5'],['F6','F6'],['F7','F7'],['F8','F8'],['F9','F9'],['F10','F10'],['F11','F11'],['F12','F12']],
  [['Backquote','`'],['Digit1','1'],['Digit2','2'],['Digit3','3'],['Digit4','4'],['Digit5','5'],['Digit6','6'],['Digit7','7'],['Digit8','8'],['Digit9','9'],['Digit0','0'],['Minus','-'],['Equal','='],['Backspace','⌫','wide']],
  [['Tab','tab','wide'],['KeyQ','Q'],['KeyW','W'],['KeyE','E'],['KeyR','R'],['KeyT','T'],['KeyY','Y'],['KeyU','U'],['KeyI','I'],['KeyO','O'],['KeyP','P'],['BracketLeft','['],['BracketRight',']'],['Backslash','\\']],
  [['CapsLock','caps','xwide'],['KeyA','A'],['KeyS','S'],['KeyD','D'],['KeyF','F'],['KeyG','G'],['KeyH','H'],['KeyJ','J'],['KeyK','K'],['KeyL','L'],['Semicolon',';'],['Quote','\''],['Enter','⏎','wide']],
  [['ShiftLeft','⇧','xwide'],['KeyZ','Z'],['KeyX','X'],['KeyC','C'],['KeyV','V'],['KeyB','B'],['KeyN','N'],['KeyM','M'],['Comma',','],['Period','.'],['Slash','/'],['ShiftRight','⇧','xwide']],
  [['Fn','fn'],['ControlLeft','ctrl'],['AltLeft','opt'],['MetaLeft','cmd','wide'],['Space','space','space'],['MetaRight','cmd','wide'],['AltRight','opt'],['ArrowLeft','←'],['ArrowUp','↑'],['ArrowDown','↓'],['ArrowRight','→']],
];
tests.keyboard = () => {
  const ui = L().ui;
  let html = `<h3>${ui.kbTitle}</h3><p class="hint">${ui.kbHint}</p><div id="kb">`;
  for (const row of KB_ROWS) {
    html += '<div class="kbrow">';
    for (const [code, label, cls] of row)
      html += `<div class="key ${cls || ''}" data-code="${code}">${label}</div>`;
    html += '</div>';
  }
  html += '</div><p id="kbcount" class="hint"></p>';
  openModal(html);
  const total = document.querySelectorAll('#kb .key').length;
  const count = () => {
    const n = document.querySelectorAll('#kb .key.tested').length;
    document.getElementById('kbcount').textContent = fmt(ui.kbTested, { n, t: total });
  };
  count();
  const down = e => {
    e.preventDefault();
    // Fn не шлёт событий сама — ловим её по Fn+стрелкам (PageUp/PageDown/Home/End)
    if (/^(PageUp|PageDown|Home|End)$/.test(e.code)) {
      const f = modalContent.querySelector('.key[data-code="Fn"]');
      if (f && !f.classList.contains('tested')) { f.classList.add('tested'); count(); }
    }
    const k = modalContent.querySelector(`.key[data-code="${e.code}"]`);
    if (k) k.classList.add('pressed');
  };
  const up = e => {
    const k = modalContent.querySelector(`.key[data-code="${e.code}"]`);
    if (k) { k.classList.remove('pressed'); k.classList.add('tested'); count(); }
  };
  window.addEventListener('keydown', down);
  window.addEventListener('keyup', up);
  modalCleanup = () => {
    window.removeEventListener('keydown', down);
    window.removeEventListener('keyup', up);
  };
};

// ---------- camera ----------
tests.camera = async () => {
  const ui = L().ui;
  openModal(`<h3>${ui.camTitle}</h3><video autoplay playsinline muted></video><p class="hint">${ui.camHint}</p>`);
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    modalContent.querySelector('video').srcObject = stream;
    modalCleanup = () => stream.getTracks().forEach(t => t.stop());
  } catch (e) {
    modalContent.innerHTML += `<p style="color:#d70015">${ui.camErr}${e.message}</p>`;
  }
};

// ---------- microphone ----------
tests.mic = async () => {
  const ui = L().ui;
  openModal(`<h3>${ui.micTitle}</h3><p>${ui.micHint}</p><div id="miclevel"><div id="micfill"></div></div>`);
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ctx = new AudioContext();
    const analyser = ctx.createAnalyser();
    ctx.createMediaStreamSource(stream).connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    let raf;
    const loop = () => {
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      const fill = document.getElementById('micfill');
      if (fill) fill.style.width = Math.min(100, avg * 1.5) + '%';
      raf = requestAnimationFrame(loop);
    };
    loop();
    modalCleanup = () => { cancelAnimationFrame(raf); stream.getTracks().forEach(t => t.stop()); ctx.close(); };
  } catch (e) {
    modalContent.innerHTML += `<p style="color:#d70015">${ui.micErr}${e.message}</p>`;
  }
};

// ---------- speakers ----------
tests.speakers = () => {
  const ui = L().ui;
  openModal(`<h3>${ui.spkTitle}</h3>
    <p>${ui.spkHint}</p>
    <div class="btnrow">
      <button data-pan="-1">${ui.spkLeft}</button>
      <button data-pan="1">${ui.spkRight}</button>
      <button data-pan="0">${ui.spkBoth}</button>
      <button data-pan="sweep">${ui.spkSweep}</button>
    </div>`);
  const ctx = new AudioContext();
  modalContent.querySelectorAll('[data-pan]').forEach(b => {
    b.onclick = () => {
      const osc = ctx.createOscillator();
      const pan = ctx.createStereoPanner();
      const gain = ctx.createGain();
      gain.gain.value = 0.3;
      osc.connect(gain).connect(pan).connect(ctx.destination);
      if (b.dataset.pan === 'sweep') {
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10000, ctx.currentTime + 3);
        pan.pan.value = 0;
        osc.start(); osc.stop(ctx.currentTime + 3);
      } else {
        osc.frequency.value = 440;
        pan.pan.value = +b.dataset.pan;
        osc.start(); osc.stop(ctx.currentTime + 1.2);
      }
    };
  });
  modalCleanup = () => ctx.close();
};

// ---------- charging / battery ----------
tests.battery = async () => {
  const ui = L().ui;
  openModal(`<h3>${ui.batTitle}</h3><div id="batteryinfo">${ui.batLoading}</div><p class="hint">${ui.batHint}</p>`);
  if (!navigator.getBattery) {
    document.getElementById('batteryinfo').textContent = ui.batNoApi;
    return;
  }
  const b = await navigator.getBattery();
  const render = () => {
    const el = document.getElementById('batteryinfo');
    if (el) el.innerHTML =
      `${ui.batStatus}: <b>${b.charging ? ui.batCharging : ui.batOnBattery}</b><br>${ui.batLevel}: <b>${Math.round(b.level * 100)}%</b>`;
  };
  render();
  b.addEventListener('chargingchange', render);
  b.addEventListener('levelchange', render);
  modalCleanup = () => {
    b.removeEventListener('chargingchange', render);
    b.removeEventListener('levelchange', render);
  };
};

// ---------- trackpad ----------
tests.trackpad = () => {
  const ui = L().ui;
  openModal(`<h3>${ui.padTitle}</h3>
    <p class="hint">${ui.padHint}</p>
    <canvas id="padcanvas"></canvas>
    <div class="padstats">
      <span id="st-move">${ui.padMove}</span>
      <span id="st-left">${ui.padLeft}</span>
      <span id="st-right">${ui.padRight}</span>
      <span id="st-scroll">${ui.padScroll}</span>
    </div>
    <div class="btnrow"><button id="padclear" class="secondary">${ui.padClear}</button></div>`);
  const cv = document.getElementById('padcanvas');
  cv.width = cv.clientWidth * devicePixelRatio;
  cv.height = 260 * devicePixelRatio;
  const g = cv.getContext('2d');
  g.scale(devicePixelRatio, devicePixelRatio);
  g.strokeStyle = '#0071e3'; g.lineWidth = 2; g.lineCap = 'round';
  const ok = id => document.getElementById(id)?.classList.add('ok');
  let last = null;
  cv.addEventListener('pointermove', e => {
    ok('st-move');
    const r = cv.getBoundingClientRect();
    const p = [e.clientX - r.left, e.clientY - r.top];
    if (last) { g.beginPath(); g.moveTo(...last); g.lineTo(...p); g.stroke(); }
    last = p;
  });
  cv.addEventListener('pointerleave', () => last = null);
  cv.addEventListener('click', () => ok('st-left'));
  cv.addEventListener('contextmenu', e => { e.preventDefault(); ok('st-right'); });
  cv.addEventListener('wheel', e => { e.preventDefault(); ok('st-scroll'); }, { passive: false });
  document.getElementById('padclear').onclick = () => g.clearRect(0, 0, cv.width, cv.height);
};

// ---------- wifi status ----------
function wifiUpd() {
  const el = document.getElementById('wifistatus');
  if (el) el.textContent = navigator.onLine ? L().ui.wifiOn : L().ui.wifiOff;
}
window.addEventListener('online', wifiUpd);
window.addEventListener('offline', wifiUpd);

// ---------- terminal commands ----------
const TERM_CMDS = [
 ['full', `bash <<'MACCHECK_EOF'
R=""
add(){ R="$R$1
"; echo "$1"; }
HW=$(system_profiler SPHardwareDataType 2>/dev/null)
AL=$(printf '%s' "$HW" | awk -F': ' '/Activation Lock/{print $2}')
case "$AL" in
 *Disabled*) add "activation=pass";;
 "") add "activation=warn no data";;
 *) add "activation=fail $AL";;
esac
SN=$(printf '%s' "$HW" | awk -F': ' '/Serial Number/{print $2; exit}')
[ -n "$SN" ] && add "serial=note $SN"
BAT=$(ioreg -r -c AppleSmartBattery 2>/dev/null)
CYC=$(printf '%s' "$BAT" | awk '/"CycleCount" =/{print $3; exit}')
DES=$(printf '%s' "$BAT" | awk '/"DesignCapacity" =/{print $3; exit}')
MAX=$(printf '%s' "$BAT" | awk '/"AppleRawMaxCapacity" =/{print $3; exit}')
[ -z "$MAX" ] && MAX=$(printf '%s' "$BAT" | awk '/"NominalChargeCapacity" =/{print $3; exit}')
if [ -n "$MAX" ] && [ -n "$DES" ] && [ "$DES" -gt 0 ]; then
  PCT=$((MAX*100/DES))
  if [ $PCT -ge 80 ]; then add "batthealth=pass $PCT%"; else add "batthealth=fail $PCT%"; fi
fi
if [ -n "$CYC" ]; then
  if [ "$CYC" -lt 500 ]; then add "cycles=pass $CYC"; else add "cycles=warn $CYC"; fi
fi
DISK=$(diskutil info disk0 2>/dev/null)
SIZE=$(printf '%s' "$DISK" | awk -F': *' '/Disk Size/{print $2}' | awk '{print $1, $2}')
[ -n "$SIZE" ] && add "storage=note $SIZE"
SMART=$(printf '%s' "$DISK" | awk -F': *' '/SMART Status/{print $2}')
case "$SMART" in
 Verified) add "smart=pass";;
 "") add "smart=warn no data";;
 *) add "smart=fail $SMART";;
esac
ENR=$(profiles status -type enrollment 2>/dev/null)
if printf '%s' "$ENR" | grep -q "DEP: No" && printf '%s' "$ENR" | grep -q "enrollment: No"; then
  add "mdmcli=pass"
elif [ -z "$ENR" ]; then
  add "mdmcli=warn no output"
else
  add "mdmcli=fail $(printf '%s' "$ENR" | tr '\n' ' ')"
fi
if pgrep -x mdmclient >/dev/null; then add "mdmprocess=warn running"; else add "mdmprocess=pass"; fi
if [ -d "/Library/Managed Preferences" ] && [ -n "$(ls -A '/Library/Managed Preferences' 2>/dev/null)" ]; then
  add "mdmprofiles=warn managed prefs found"
else
  add "mdmprofiles=pass"
fi
if [ "$(uname -m)" = "arm64" ]; then
  add "firmware=pass Apple Silicon (n/a)"
else
  FW=$(sudo firmwarepasswd -check 2>/dev/null)
  case "$FW" in
   *No*) add "firmware=pass";;
   *Yes*) add "firmware=fail set";;
   *) add "firmware=warn no data";;
  esac
fi
printf '%s' "$R" | pbcopy
echo "--- copied to clipboard / скопировано в буфер ---"
MACCHECK_EOF`],
 ['model', `system_profiler SPHardwareDataType | grep -E "Model|Chip|Processor|Memory|Serial"`],
 ['lock', `system_profiler SPHardwareDataType | grep "Activation Lock"`],
 ['battery', `ioreg -r -c AppleSmartBattery | grep -E '"(CycleCount|DesignCapacity|AppleRawMaxCapacity|NominalChargeCapacity)" ='`],
 ['disk', `diskutil info disk0 | grep -E "Disk Size|SMART"`],
 ['mdm', `profiles status -type enrollment`],
 ['mdmproc', `pgrep -x mdmclient || echo "OK: mdmclient not running"`],
 ['managed', `ls "/Library/Managed Preferences" 2>/dev/null || echo "OK: no managed preferences"`],
 ['sudocheck', `sudo -v`],
 ['firmware', `sudo firmwarepasswd -check`],
 ['fans', `sudo powermetrics -s smc -n 1 | grep -i fan`],
 ['stress', `for i in $(seq $(sysctl -n hw.ncpu)); do yes >/dev/null & done; sleep 40; killall yes`],
];
function openTerm() {
  const ui = L().ui;
  let html = `<h3>${ui.termTitle}</h3><p class="hint">${ui.termHint}</p>`;
  for (const [key, cmd] of TERM_CMDS) {
    html += `<p style="margin:10px 0 4px">${ui['cmd' + key]}</p>` +
      `<div class="cmdrow"><pre class="cmd">${cmd.replace(/&/g, '&amp;').replace(/</g, '&lt;')}</pre>` +
      `<button class="test" data-copy>${ui.copy}</button></div>`;
  }
  openModal(html);
  modalContent.querySelectorAll('[data-copy]').forEach((b, i) => {
    b.onclick = async () => {
      try { await navigator.clipboard.writeText(TERM_CMDS[i][1]); }
      catch {
        const t = document.createElement('textarea');
        t.value = TERM_CMDS[i][1];
        document.body.appendChild(t); t.select();
        document.execCommand('copy'); t.remove();
      }
      b.textContent = ui.copied;
      setTimeout(() => { b.textContent = ui.copy; }, 1500);
    };
  });
}
document.getElementById('termbtn').onclick = openTerm;

// ---------- auto-check paste ----------
function badge(id) {
  const a = statuses[id];
  if (!a) return '';
  const icon = { pass: '✔', warn: '⚠', fail: '✘', note: 'ℹ' }[a.s] || '';
  return ` <span class="autonote ${a.s}">${icon}${a.v ? ' ' + a.v : ''}</span>`;
}
function applyPaste() {
  const area = document.getElementById('pastearea');
  let n = 0;
  for (const line of area.value.split('\n')) {
    const m = line.trim().match(/^([a-z]+)=(pass|warn|fail|note)\s*(.*)$/i);
    if (!m) continue;
    const id = m[1].toLowerCase(), st = m[2].toLowerCase(), v = m[3].trim();
    if (id === 'serial') { if (v) { localStorage.setItem(LS_SN, v.toUpperCase()); n++; } continue; }
    if (!I18N.en.items[id]) continue;
    if (st === 'pass' || st === 'warn') state[id] = true;
    if (st === 'fail') state[id] = false;
    statuses[id] = { s: st, v };
    n++;
  }
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  localStorage.setItem(AUTO_KEY, JSON.stringify(statuses));
  const keep = area.value;
  render();
  document.getElementById('pastearea').value = keep;
  document.getElementById('applyres').textContent = fmt(L().ui.applied, { n });
}

render();
</script>
